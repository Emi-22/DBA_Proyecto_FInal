# ============================================
# Docker Compose — Prometheus + Grafana + Exporters
# PostgreSQL BDR Cluster Monitoring
# Equipo L — Instituto Tecnológico de la Laguna
# ============================================
# Uso: docker compose up -d
# Prometheus: http://localhost:9090
# Grafana:    http://localhost:3000

version: '3.8'

services:
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  postgres-exporter-nodo1:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres_exporter_nodo1
    restart: always
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres_exporter:exporter123@10.0.0.133:5432/bdrdb?sslmode=disable
    depends_on:
      - prometheus

  postgres-exporter-nodo2:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres_exporter_nodo2
    restart: always
    ports:
      - "9188:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres_exporter:exporter123@10.0.0.246:5432/bdrdb?sslmode=disable
    depends_on:
      - prometheus

  postgres-exporter-nodo3:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres_exporter_nodo3
    restart: always
    ports:
      - "9189:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres_exporter:exporter123@10.0.0.80:5432/bdrdb?sslmode=disable
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node_exporter
    restart: always
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

volumes:
  prometheus_data:
  grafana_data: