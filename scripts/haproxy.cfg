global
    log /dev/log local0
    log /dev/log local1 notice
    maxconn 4096
    user haproxy
    group haproxy
    daemon

defaults
    log global
    mode tcp
    option tcplog
    option dontlognull
    timeout connect 5s
    timeout client 30s
    timeout server 30s

# Frontend — recibe conexiones en puerto 5433
frontend postgresql_front
    bind *:5433
    default_backend postgresql_back

# Backend — distribuye entre los 3 nodos round-robin
backend postgresql_back
    balance roundrobin
    option tcp-check
    server nodo1 10.0.0.133:5432 check inter 2s rise 2 fall 3
    server nodo2 10.0.0.246:5432 check inter 2s rise 2 fall 3
    server nodo3 10.0.0.80:5432  check inter 2s rise 2 fall 3

# Panel de estadísticas de HAProxy
frontend stats
    bind *:8404
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if TRUE
