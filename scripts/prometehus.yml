global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'postgresql-nodo1'
    static_configs:
      - targets: ['postgres-exporter-nodo1:9187']

  - job_name: 'postgresql-nodo2'
    static_configs:
      - targets: ['postgres-exporter-nodo2:9187']

  - job_name: 'postgresql-nodo3'
    static_configs:
      - targets: ['postgres-exporter-nodo3:9187']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'haproxy'
    static_configs:
      - targets: ['10.0.0.133:8404']